---
name: Test and lint
permissions:
    contents: read
on:
    push:
    merge_group:
    schedule:
        - cron: 0 10 * * 2
    workflow_dispatch:
    repository_dispatch:
        types: [trigger_checks]
env:
    RUFF_OUTPUT_FORMAT: github
    UV_FROZEN: 1
    PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
jobs:
    lint:
        name: Format, lint, and type check
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@v8.1.0
              id: setup-uv
              with:
                  activate-environment: true
                  cache-suffix: lint

            - name: Cache cargo and rust build
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      rust/target/
                  key: lint-cargo-rust-target-${{ runner.os }}${{ runner.arch }}-python${{ steps.setup-uv.outputs.python-version }}-${{ hashFiles('**/Cargo.lock')
                      }}-${{ github.run_id }}
                  restore-keys: |
                      lint-cargo-rust-target-${{ runner.os }}${{ runner.arch }}-python${{ steps.setup-uv.outputs.python-version }}-${{ hashFiles('**/Cargo.lock') }}-
                      lint-cargo-rust-target-${{ runner.os }}${{ runner.arch }}-python${{ steps.setup-uv.outputs.python-version }}-
                      lint-cargo-rust-target-${{ runner.os }}${{ runner.arch }}-
                      cargo-rust-target-${{ runner.os }}${{ runner.arch }}-

            - name: Install artistools[extras]
              run: |
                  uv sync --all-extras

            - name: Run Ruff
              if: always()
              run: |
                  uv run -- ruff --version
                  uv run -- ruff check --exit-non-zero-on-fix --no-fix

            - name: Run Ruff Format
              if: always()
              run: uv run -- ruff format --check --exit-non-zero-on-format

            - name: Run basedpyright
              if: always()
              run: uv run -- basedpyright --warnings

            - name: Run pyrefly
              if: always()
              run: uv run -- pyrefly check --output-format github

            - name: Run mypy
              if: always()
              run: uv run -- mypy

            - name: Run prek pre-commit checks
              uses: j178/prek-action@v2

            - name: Run rust clippy
              if: always()
              working-directory: rust/
              run: |
                  rustup component add clippy
                  cargo clippy --all-features -- -D warnings -D clippy::pedantic

    pytest:
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                os: [{name: macos, version: '26'}, {name: ubuntu, version: 24.04-arm}]
                python-version: ['3.12', '3.13', '3.14', 3.14t]
                exclude:
                    # macos runners are very limited in number
                    - os: {name: macos, version: '26'}
                      python-version: '3.12'
                    - os: {name: ubuntu, version: 24.04-arm}
                      python-version: 3.14t
        runs-on: ${{ matrix.os.name }}-${{ matrix.os.version }}
        env:
            OS: ${{ matrix.os.name }}-${{ matrix.os.version }}
            PYTHON: ${{ matrix.python-version }}
        name: pytest ${{ matrix.os.name }} python ${{ matrix.python-version }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Setup uv
              uses: astral-sh/setup-uv@v8.1.0
              id: setup-uv
              with:
                  activate-environment: true
                  python-version: ${{ matrix.python-version }}

            - name: Cache cargo and rust build
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      rust/target/
                  key: cargo-rust-target-${{ runner.os }}${{ runner.arch }}-python${{ steps.setup-uv.outputs.python-version }}-${{ hashFiles('**/Cargo.lock')
                      }}-${{ github.run_id }}
                  restore-keys: |
                      cargo-rust-target-${{ runner.os }}${{ runner.arch }}-python${{ steps.setup-uv.outputs.python-version }}-${{ hashFiles('**/Cargo.lock') }}-
                      cargo-rust-target-${{ runner.os }}${{ runner.arch }}-python${{ steps.setup-uv.outputs.python-version }}-
                      cargo-rust-target-${{ runner.os }}${{ runner.arch }}-

            - name: Install deps for building pyarrow and scipy from source
              if: matrix.os.name == 'macos' && matrix.python-version == '3.15'
              run: |
                  brew update
                  brew install apache-arrow
                  echo "ARROW_HOME=$(brew --prefix apache-arrow)" >> $GITHUB_ENV
                  brew install gcc openblas
                  echo "LDFLAGS=-L/opt/homebrew/opt/openblas/lib" >> $GITHUB_ENV
                  echo "CPPFLAGS=-I/opt/homebrew/opt/openblas/include" >> $GITHUB_ENV
                  echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/openblas" >> $GITHUB_ENV
                  echo "PKG_CONFIG_PATH=/opt/homebrew/opt/openblas/lib/pkgconfig" >> $GITHUB_ENV

                  uv pip install pyarrow
                  GCC_MAJOR="$(brew list --versions gcc | awk '{print $2}' | cut -d. -f1)"
                  CXX="g++-${GCC_MAJOR}" FC="gfortran-${GCC_MAJOR}" uv pip install scipy

            - name: Install artistools (no dev deps)
              run: |
                  rustup update stable
                  uv sync --no-dev --compile-bytecode

            - name: Check artistools command line tool
              run: |
                  artistools --help
                  artistools completions

            - name: Download/extract test data
              working-directory: tests/data/
              run: source ./setuptestdata.sh

            - name: Install dev deps
              run: uv sync

            - name: Test with pytest
              run: uv run --no-sync -- python -m pytest ${{ (matrix.python-version == '3.15') && '--typeguard-packages=none' || '' }} --cov=./ --cov-report=xml

            - name: Report coverage
              run: uv run -- python -m coverage report

            - uses: codecov/codecov-action@v6
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage.xml
                  flags: unittests
                  env_vars: OS,PYTHON
                  name: codecov-umbrella
                  fail_ci_if_error: false
                  verbose: true

            - name: Upload output files
              uses: actions/upload-artifact@v7
              with:
                  name: testoutput-${{ matrix.os.name }}-${{ matrix.os.version }}-py${{ matrix.python-version }}
                  path: tests/output/
