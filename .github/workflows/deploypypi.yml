---
name: Build and deploy to PyPI/testPyPI
permissions:
    contents: read
on:
    push:
        paths:
            - .github/workflows/deploypypi.yml
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            deploy-to-pypi:
                description: Do real deployment to PyPI (not TestPyPI)
                required: true
                default: 'false'
env:
    MACOSX_DEPLOYMENT_TARGET: 13.0
    PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
    UV_FROZEN: 1

jobs:
    build_wheels:
        name: Build python3${{ matrix.freethreading }} ${{ matrix.target.os_arch }}
        strategy:
            matrix:
                target: [{os_arch: manylinux_x86_64, runs-on: ubuntu-26.04}, {os_arch: manylinux_aarch64, runs-on: ubuntu-26.04-arm}, {os_arch: macosx_arm64,
                          runs-on: macos-26}]
                freethreading: [t, '']
            fail-fast: false
        runs-on: ${{ matrix.target.runs-on }}
        env:
            CIBW_ENVIRONMENT_PASS_LINUX: SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ARTISTOOLS
            CIBW_BUILD: cp3??${{ matrix.freethreading }}-${{ matrix.target.os_arch }}
        steps:
            - uses: actions/checkout@v7

            - name: Cache cargo and rust build
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      rust/target/
                  key: cibw-rust-target-${{ runner.os }}${{ runner.arch }}-python3${{ matrix.freethreading }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id
                      }}
                  restore-keys: |
                      cibw-rust-target-${{ runner.os }}${{ runner.arch }}-python3${{ matrix.freethreading }}-${{ hashFiles('**/Cargo.lock') }}
                      cibw-rust-target-${{ runner.os }}${{ runner.arch }}-python3${{ matrix.freethreading }}-
                      cibw-rust-target-${{ runner.os }}${{ runner.arch }}-

            - uses: astral-sh/setup-uv@v8.2.0

            - name: Build wheels
              uses: pypa/cibuildwheel@v4.1
              with:
                  output-dir: wheelhouse

            - uses: actions/upload-artifact@v7
              with:
                  name: cibw-wheels-${{ matrix.target.os_arch }}-${{ strategy.job-index }}
                  path: ./wheelhouse/*.whl

    build_sdist:
        name: Build source distribution
        runs-on: ubuntu-26.04-arm
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.2.0

            - name: Build sdist
              run: uv build --sdist

            - uses: actions/upload-artifact@v7
              with:
                  name: cibw-sdist
                  path: dist/*.tar.gz

    testdeploy:
        name: Test upload to TestPyPI
        needs: [build_wheels, build_sdist]
        runs-on: ubuntu-26.04
        environment:
            name: test
            url: https://test.pypi.org/project/artistools/
        permissions:
            id-token: write
        steps:
            - uses: actions/download-artifact@v8
              with:
                  pattern: cibw-*
                  path: dist
                  merge-multiple: true

            - name: Publish package to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  skip-existing: true
                  verbose: true
                  repository-url: https://test.pypi.org/legacy/

    deploy:
        name: Upload to PyPI
        needs: [build_wheels, build_sdist]
        runs-on: ubuntu-24.04
        environment:
            name: release
            url: https://pypi.org/project/artistools/
        permissions:
            id-token: write
        if: github.event.inputs.deploy-to-pypi == 'true' || github.event_name == 'release'
        steps:
            - uses: actions/download-artifact@v8
              with:
                  pattern: cibw-*
                  path: dist
                  merge-multiple: true

            - name: Publish package to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  skip-existing: true
                  verbose: false
