---
version: 2
updates:

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      groups:
          github-actions:
          patterns:
              - '*'

    - package-ecosystem: uv
      directory: /
      schedule:
          interval: weekly
      groups:
          lockfile:
              patterns:
                  - '*'

    - package-ecosystem: pre-commit
      directory: /
      schedule:
          interval: weekly
      groups:
          pre-commit:
              patterns:
                  - '*'

    - package-ecosystem: cargo
      directory: /
      schedule:
          interval: weekly
      allow:
          - dependency-type: indirect
      groups:
          lockfile:
              patterns:
                  - '*'
