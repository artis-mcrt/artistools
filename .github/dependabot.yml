---
version: 2
updates:

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      groups:
          github-actions:
              patterns:
                  - '*'

    - package-ecosystem: uv
      directory: /
      schedule:
          interval: weekly
      versioning-strategy: lockfile-only
      groups:
          lockfile:
              patterns:
                  - '*'

    - package-ecosystem: cargo
      directory: /
      schedule:
          interval: weekly
      versioning-strategy: lockfile-only
      groups:
          lockfile:
              patterns:
                  - '*'
